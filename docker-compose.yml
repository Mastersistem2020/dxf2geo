services:
  dxf2geo:
    build: .
    # image: dxf2geo:latest   # use this after: docker build -t dxf2geo .
    volumes:
      - ./input:/input
      - ./output:/output
    environment:
      # Set to "true" to keep running and watch for new files
      WATCH_MODE: "false"
    restart: "no"   # Change to "unless-stopped" if WATCH_MODE=true

  # Watch-mode variant (always-on, monitors input folder):
  # dxf2geo-watch:
  #   build: .
  #   volumes:
  #     - /pfad/zu/dxf/dateien:/input
  #     - /pfad/zu/geo/ausgabe:/output
  #   environment:
  #     WATCH_MODE: "true"
  #   restart: unless-stopped
